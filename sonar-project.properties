# Required metadata
sonar.projectKey=voice-rag-ui
sonar.projectName=Voice RAG UI

# Comma-separated paths to directories with sources
sonar.sources=app,components,lib
sonar.exclusions=**/*.test.tsx,**/*.test.ts,**/node_modules/**,.next/**

# Comma-separated paths to directories with tests
# sonar.tests=tests

# Language and encoding
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info
